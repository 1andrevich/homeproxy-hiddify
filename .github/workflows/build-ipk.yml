name: Build ipk for HomeProxy hiddify

on:
  push:
    branches:
      - 'master'
    paths:
      - 'htdocs/**'
      - 'po/**'
      - 'root/**'
      - 'Makefile'
      - '.github/**'
      - '!.github/ISSUE_TEMPLATE/**'

  pull_request:
    branches:
      - 'master'
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'htdocs/**'
      - 'po/**'
      - 'root/**'
      - 'Makefile'
      - '.github/**'
      - '!.github/ISSUE_TEMPLATE/**'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      APK_SIGN_KEY: ''

    steps:
      - name: Checkout source tree
        uses: actions/checkout@v6

      - name: Checkout apk
        uses: actions/checkout@v6
        with:
          repository: 'alpinelinux/apk-tools'
          path: 'apk-tools'
          fetch-depth: 0
          ref: 'b5a31c0d865342ad80be10d68f1bb3d3ad9b0866'

      - name: Checkout po2lmo
        uses: actions/checkout@v6
        with:
          repository: 'openwrt/luci'
          path: 'po2lmo'
          sparse-checkout: 'modules/luci-base/src'

      - name: Setup dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E rm -rf /var/lib/man-db/auto-update
          sudo -E apt-get update -qq
          sudo -E apt-get install -y build-essential curl fakeroot libssl-dev lua5.1 meson ninja-build

          pushd apk-tools
          meson setup build \
            -Db_lto=true \
            -Dcompressed-help=false \
            -Ddocs=disabled \
            -Dhelp=enabled \
            -Dlua_version=5.1 \
            -Ddefault_library=static \
            -Durl_backend=wget \
            -Dzstd=false \
            -Dpython=disabled \
            -Dtests=disabled \
            -Dcrypto_backend=openssl
          ninja -C build
          sudo -E meson install -C build --strip
          popd

          pushd po2lmo/modules/luci-base/src
          make po2lmo
          sudo -E install -m0755 -s po2lmo /usr/local/bin/po2lmo
          popd

          curl -fLO "https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build"
          sudo install -m0755 ipkg-build /usr/local/bin/ipkg-build

      - name: Generate release tag
        id: tag
        run: echo "release_tag=$(date -u +%Y.%m.%d)-r$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT

      - name: Setup APK signing key
        run: |
          if [ -n "${{ secrets.APK_SIGNING_KEY }}" ]; then
            echo "${{ secrets.APK_SIGNING_KEY }}" > /tmp/apk-signing.key
            chmod 600 /tmp/apk-signing.key
            openssl rsa -in /tmp/apk-signing.key -pubout -out .github/homeproxy-hiddify.pub 2>/dev/null || \
            openssl ec  -in /tmp/apk-signing.key -pubout -out .github/homeproxy-hiddify.pub 2>/dev/null || true
            echo "APK_SIGN_KEY=/tmp/apk-signing.key" >> $GITHUB_ENV
          else
            echo "No APK_SIGNING_KEY secret set — building unsigned package"
          fi

      - name: Build ipk file
        run: |
          pushd .github
          fakeroot bash build-ipk.sh apk "${{ github.event_name }}"
          fakeroot bash build-ipk.sh ipk "${{ github.event_name }}"
          echo "APK_ASSET_NAME=$(ls luci-app-re-homeproxy_*_all.apk)" >> $GITHUB_ENV
          echo "IPK_ASSET_NAME=$(ls luci-app-re-homeproxy_*_all.ipk)" >> $GITHUB_ENV
          echo "I18N_APK_ASSET_NAME=$(ls luci-i18n-homeproxy-ru_*_all.apk)" >> $GITHUB_ENV
          echo "I18N_IPK_ASSET_NAME=$(ls luci-i18n-homeproxy-ru_*_all.ipk)" >> $GITHUB_ENV
          echo "I18N_ZH_APK_ASSET_NAME=$(ls luci-i18n-homeproxy-zh-cn_*_all.apk)" >> $GITHUB_ENV
          echo "I18N_ZH_IPK_ASSET_NAME=$(ls luci-i18n-homeproxy-zh-cn_*_all.ipk)" >> $GITHUB_ENV
          echo "I18N_FA_APK_ASSET_NAME=$(ls luci-i18n-homeproxy-fa_*_all.apk)" >> $GITHUB_ENV
          echo "I18N_FA_IPK_ASSET_NAME=$(ls luci-i18n-homeproxy-fa_*_all.ipk)" >> $GITHUB_ENV
          popd

      - name: Build legacy IPK (OpenWRT 23.05)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p .github/legacy
          pushd .github
          fakeroot bash build-ipk.sh ipk "${{ github.event_name }}" legacy
          mv luci-*-legacy.ipk legacy/
          popd

      - name: Publishing APK files to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release'
        with:
          name: ${{ env.APK_ASSET_NAME }}
          path: .github/${{ env.APK_ASSET_NAME }}

      - name: Publishing IPK files to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release'
        with:
          name: ${{ env.IPK_ASSET_NAME }}
          path: .github/${{ env.IPK_ASSET_NAME }}

      - name: Publishing i18n APK to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release'
        with:
          name: ${{ env.I18N_APK_ASSET_NAME }}
          path: .github/${{ env.I18N_APK_ASSET_NAME }}

      - name: Publishing i18n IPK to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release'
        with:
          name: ${{ env.I18N_IPK_ASSET_NAME }}
          path: .github/${{ env.I18N_IPK_ASSET_NAME }}

      - name: Publishing i18n zh-cn APK to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release'
        with:
          name: ${{ env.I18N_ZH_APK_ASSET_NAME }}
          path: .github/${{ env.I18N_ZH_APK_ASSET_NAME }}

      - name: Publishing i18n zh-cn IPK to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release'
        with:
          name: ${{ env.I18N_ZH_IPK_ASSET_NAME }}
          path: .github/${{ env.I18N_ZH_IPK_ASSET_NAME }}

      - name: Publishing i18n fa APK to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release'
        with:
          name: ${{ env.I18N_FA_APK_ASSET_NAME }}
          path: .github/${{ env.I18N_FA_APK_ASSET_NAME }}

      - name: Publishing i18n fa IPK to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release'
        with:
          name: ${{ env.I18N_FA_IPK_ASSET_NAME }}
          path: .github/${{ env.I18N_FA_IPK_ASSET_NAME }}

      - name: Publishing signing public key to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release' && env.APK_SIGN_KEY != ''
        with:
          name: homeproxy-hiddify.pub
          path: .github/homeproxy-hiddify.pub

      - name: Publishing draft pre-release to GitHub Releases
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          repo_token: ${{ github.token }}
          file: .github/*.{apk,ipk,pub}
          file_glob: true
          tag: ${{ steps.tag.outputs.release_tag }}
          release_name: ${{ steps.tag.outputs.release_tag }}
          prerelease: true
          draft: true
          body: ""

      - name: Publishing legacy draft release to GitHub Releases
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          repo_token: ${{ github.token }}
          file: .github/legacy/*.ipk
          file_glob: true
          tag: ${{ steps.tag.outputs.release_tag }}-legacy
          release_name: ${{ steps.tag.outputs.release_tag }}-legacy (OpenWRT 23.05)
          prerelease: true
          draft: true
          body: "Legacy build for OpenWRT 23.05 — no ucode-mod-digest dependency."

      - name: Publishing to GitHub Releases
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'release'
        with:
          repo_token: ${{ github.token }}
          file: .github/*.{apk,ipk,pub}
          file_glob: true
          tag: ${{ github.ref }}

